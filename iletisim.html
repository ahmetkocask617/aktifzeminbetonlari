<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - AKTİF</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; padding: 150px 10%; max-width: 1200px; margin: 0 auto; }
        .contact-info h2 { font-size: 2.5rem; margin-bottom: 20px; }
        .form-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" id="logo">AKTİF <span>BETON & OTOMOTİV</span></a>
    <div class="hamburger" onclick="toggleMenu()">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <nav id="nav-menu">
        <a href="index.html">Ana Sayfa</a>
        <a href="hakkimizda.html">Hakkımızda</a>
        <a href="projeler.html">Projeler</a>
        <a href="ilanlar.html">İlanlar</a>
        <a href="iletisim.html" class="bize-ulasin">Bize Ulaşın</a>
    </nav>
</header>

<div class="contact-grid">
    <div class="contact-info">
        <h2>Bize Ulaşın</h2>
        <p><strong>📍 Adres:</strong> Polatlı, Ankara</p><br>
        <p><strong>📞 Tel:</strong> +90 534 208 36 91</p><br>
        <p><strong>✉️ E-posta:</strong> info@aktifzeminbetonlari.com</p>
    </div>
    <div class="form-card">
        <form>
            <input type="text" placeholder="Adınız">
            <input type="email" placeholder="E-posta">
            <textarea rows="5" placeholder="Mesajınız"></textarea>
            <button type="submit" class="btn btn-beton" style="width:100%; border:none;">GÖNDER</button>
        </form>
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('nav-menu').classList.toggle('active');
        document.querySelector('.hamburger').classList.toggle('toggle');
    }
</script>
</body>
</html>
