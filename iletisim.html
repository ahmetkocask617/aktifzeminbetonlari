<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - AKTİF</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container { padding: 150px 10% 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; max-width: 1200px; margin: 0 auto; }
        .info-box h2 { font-size: 2.5rem; margin-bottom: 20px; color: #2c3e50; }
        .contact-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 10px; background: #fdfdfd; font-family: inherit; }
        @media (max-width: 900px) { .contact-container { grid-template-columns: 1fr; padding-top: 120px; } }
    </style>
</head>
<body>
<header>
    <a href="index.html" id="logo">AKTİF <span>BETON & OTOMOTİV</span></a>
    <div class="hamburger" onclick="toggleMenu()">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <nav id="nav-menu">
        <a href="index.html">Ana Sayfa</a>
        <a href="hakkimizda.html">Hakkımızda</a>
        <a href="projeler.html">Projeler</a>
        <a href="ilanlar.html">İlanlar</a>
        <a href="iletisim.html" class="bize-ulasin">Bize Ulaşın</a>
    </nav>
</header>
<div class="contact-container">
    <div class="info-box">
        <h2>Bize Ulaşın</h2>
        <p>Proje talepleriniz ve araç detayları için uzman ekibimizle iletişime geçin.</p><br>
        <p><strong>📍 Adres:</strong> Polatlı, Ankara</p><br>
        <p><strong>📞 Telefon:</strong> +90 534 208 36 91</p>
    </div>
    <div class="contact-card">
        <div class="form-group"><input type="text" placeholder="Adınız Soyadınız"></div>
        <div class="form-group"><input type="email" placeholder="E-posta Adresiniz"></div>
        <div class="form-group"><textarea rows="5" placeholder="Mesajınız"></textarea></div>
        <button class="btn btn-beton" style="width:100%; border:none;">GÖNDER</button>
    </div>
</div>
<script>
    function toggleMenu() {
        document.getElementById('nav-menu').classList.toggle('active');
        document.querySelector('.hamburger').classList.toggle('toggle');
    }
</script>
</body>
</html>
