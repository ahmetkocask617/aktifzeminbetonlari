<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlanlar - AKTİF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" id="logo">AKTİF <span>BETON & OTOMOTİV</span></a>
    <div class="hamburger" onclick="toggleMenu()">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <nav id="nav-menu">
        <a href="index.html">Ana Sayfa</a>
        <a href="hakkimizda.html">Hakkımızda</a>
        <a href="projeler.html">Projeler</a>
        <a href="ilanlar.html">İlanlar</a>
        <a href="iletisim.html" class="bize-ulasin">Bize Ulaşın</a>
    </nav>
</header>

<div class="car-grid">
    <div class="car-card" onclick="openModal('Mercedes C200d', '2018 | 90.000 KM', 'Hatasız boyasız tertemiz.', '1.850.000 TL', 'resimler/araba.jpg')">
        <img src="resimler/araba.jpg" class="card-img">
        <div style="padding:20px;"><h3>Mercedes C200d</h3><p>2018 | 90.000 KM</p><strong>1.850.000 TL</strong></div>
    </div>
    <div class="car-card" onclick="openModal('BMW 320i', '2015 | 145.000 KM', '40. Yıl Özel Seri.', '1.250.000 TL', 'resimler/araba.jpg')">
        <img src="resimler/araba.jpg" class="card-img">
        <div style="padding:20px;"><h3>BMW 320i</h3><p>2015 | 145.000 KM</p><strong>1.250.000 TL</strong></div>
    </div>
</div>

<div id="carModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="" class="modal-img">
        <h2 id="modalTitle"></h2>
        <p id="modalSub" style="color:#2980b9; margin:10px 0;"></p>
        <p id="modalDesc"></p>
        <h3 id="modalPrice" style="margin-top:20px;"></h3>
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('nav-menu').classList.toggle('active');
        document.querySelector('.hamburger').classList.toggle('toggle');
    }
    function openModal(t, s, d, p, img) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalSub').innerText = s;
        document.getElementById('modalDesc').innerText = d;
        document.getElementById('modalPrice').innerText = "Fiyat: " + p;
        document.getElementById('modalImg').src = img;
        document.getElementById('carModal').style.display = "block";
    }
    function closeModal() { document.getElementById('carModal').style.display = "none"; }
</script>
</body>
</html>
